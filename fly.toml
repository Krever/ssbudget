# fly.toml app configuration file generated for ssbudget on 2026-01-29T23:40:51+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

# First time setup:
#   fly launch --no-deploy          # Create app (skip if already exists)
#   fly volumes create ssbudget_data --region fra --size 1
#   fly secrets set SSBUDGET_RP_ID=ssbudget.fly.dev
#   fly secrets set SSBUDGET_RP_ORIGINS=https://ssbudget.fly.dev
#
# Deploy:
#   ./build.sh                      # Build everything + Docker image
#   fly deploy --local-only         # Push local image to fly.io (runs Flyway migrations V6-V8 on startup)
#

app = 'ssbudget'
primary_region = 'fra'

[build]

[env]
  SSBUDGET_DB_PATH = '/data/ssbudget.db'
  SSBUDGET_PORT = '8080'
  SSBUDGET_RP_NAME = 'SSBudget'
  SSBUDGET_STATIC_DIR = '/opt/docker/static'
  # Enable Banking: non-secret config. App id + private key are fly secrets (see header).
  # EB_BASE_URL defaults to https://api.enablebanking.com, so it's omitted.
  EB_REDIRECT_URL = 'https://ssbudget.fly.dev/banking/callback'

[[mounts]]
  source = 'ssbudget_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
